<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIA_GAME_G2_LOGIN_PAGE</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://static.vecteezy.com/system/resources/thumbnails/032/481/150/small_2x/game-2d-platformer-background-in-cartoon-style-generate-ai-photo.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .btn {
      width: 100%;
      padding: 10px;
      margin: 12px 0 6px 0;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #ff7eb3, #ff758c, #ff6a88);
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .link-btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      transition: transform 0.2s ease;
    }

    .link-btn:hover {
      transform: scale(1.05);
    }

    .forgot-link {
      margin-top: 8px;
      font-size: 13px;
      color: #2575fc;
      text-decoration: none;
      align-self: flex-end;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username" required>
    <!-- Password field with simplified restriction -->
    <input type="password" id="password" 
           placeholder="Password" 
           required 
           pattern="^[A-Za-z\\d]{6,12}$"
           title="Password must be 6-12 characters long">
    <a href="html/forgot.html" class="forgot-link" style="display: none">Forgot Password?</a>
    <button class="btn" id="login-btn">Login</button>
    <button class="link-btn" onclick="window.location.href='html/register.html'">Register</button>
  </div>

  <script type="module" src="javascript/index.js"></script>
</body>
</html>
